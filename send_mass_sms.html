<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Send Mass SMS</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #ff7e5f;
            margin-bottom: 20px;
        }

        .form-container {
            max-width: 600px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .form-container button {
            background-color: #ff7e5f;
            color: #fff;
            border: none;
        }

        .form-container button:hover {
            background-color: #feb47b;
        }

        .form-container label {
            margin-bottom: 10px;
        }

        .recipients-list {
            max-height: 200px;
            overflow-y: auto;
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
        }
    </style>
</head>

<body>
    <h1>Send Mass SMS</h1>
    <div class="form-container">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea id="message" name="message" class="form-control" rows="4" placeholder="Enter your message here"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Recipients</label>
                <div class="recipients-list" id="recipients-list">
                    <!-- Recipients will be dynamically populated here -->
                </div>
                <div class="form-check mt-2">
                    <input class="form-check-input" type="checkbox" id="select-all">
                    <label class="form-check-label" for="select-all">Select All</label>
                </div>
            </div>
            <button type="submit" class="btn btn-primary w-100">Send SMS</button>
        </form>
    </div>

    <script>
        // Replace with your actual API endpoint
        const recipientsApiUrl = "http://your-api-domain.com/api/users/";

        // Fetch and populate recipients
        async function fetchRecipients() {
            try {
                const response = await fetch(recipientsApiUrl, {
                    method: "GET",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: "Token your-auth-token", // Add token if needed
                    },
                });

                if (!response.ok) {
                    throw new Error("Failed to fetch recipients");
                }

                const users = await response.json();

                // Populate recipients list
                const recipientsList = document.getElementById("recipients-list");
                recipientsList.innerHTML = ""; // Clear previous content

                users.forEach(user => {
                    const checkbox = document.createElement("div");
                    checkbox.className = "form-check";
                    checkbox.innerHTML = `
                        <input class="form-check-input" type="checkbox" name="recipients" value="${user.id}" id="recipient-${user.id}">
                        <label class="form-check-label" for="recipient-${user.id}">${user.email}</label>
                    `;
                    recipientsList.appendChild(checkbox);
                });
            } catch (error) {
                console.error("Error fetching recipients:", error);
                document.getElementById("recipients-list").innerHTML = `<p class="text-danger">Failed to load recipients. Please try again later.</p>`;
            }
        }

        // "Select All" checkbox functionality
        document.getElementById("select-all").addEventListener("change", function () {
            const checkboxes = document.querySelectorAll('input[name="recipients"]');
            checkboxes.forEach(checkbox => {
                checkbox.checked = this.checked;
            });
        });

        // Fetch recipients on page load
        document.addEventListener("DOMContentLoaded", fetchRecipients);
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
