<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Management Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: linear-gradient(to bottom, #ff7e5f, #feb47b);
            color: #fff;
            padding: 15px;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .sidebar a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Main Content */
        .main-content {
            margin-left: 270px;
            padding: 20px;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            flex: 1 1 calc(33.333% - 20px);
            background: #fff;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 20px;
            transition: transform 0.3s ease-in-out;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            font-size: 1.25rem;
            margin: 10px 0;
        }

        .card i {
            font-size: 2rem;
            color: #ff7e5f;
        }

        /* Table Styling */
        .table {
            margin-top: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        @media screen and (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }

            .card {
                flex: 1 1 calc(50% - 20px);
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
        }

        @media screen and (max-width: 480px) {
            .card {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Church Dashboard</h2>
        <a href="#dashboard"><i class="fa fa-home me-2"></i> Dashboard</a>
        <a href="#registration"><i class="fa fa-user-plus me-2"></i> Registration</a>
        <a href="#attendance"><i class="fa fa-calendar-check me-2"></i> Attendance</a>
        <a href="#donation"><i class="fa fa-donate me-2"></i> Donation</a>
        <a href="#groups"><i class="fa fa-users me-2"></i> Groups</a>
        <a href="#events"><i class="fa fa-calendar-alt me-2"></i> Events</a>
        <a href="#reports"><i class="fa fa-chart-bar me-2"></i> Reports</a>
        <a href=""><i class="fa fa-envelope me-2"></i> Bulk Email</a>
        <a href="send_mass_sms.html"><i class="fa fa-message me-2"></i> Bulk SMS</a>
    </div>
    <div class="main-content">

        <h1>Send Mass Email</h1>
        <form method="post">
            <input type="checkbox" id="checkAll"> Select all Recipient<br/><br/>
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Send Emails</button>
        </form>
        {% if messages %}
            <ul>
                {% for message in messages %}
                    <li>{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
    </div>
    <script>
        // Select all input elements on the page
        document.getElementById('id_subject').className += ' form-control'
        document.getElementById('id_message').className += ' form-control'
        document.getElementById('checkAll').addEventListener('change', function() {
            // Select all checkboxes with the class 'checkbox'
            let checkboxes = document.querySelectorAll('input[name="recipients"]');

            // Set each checkbox to the checked state of the 'checkAll' checkbox
            checkboxes.forEach(function(checkbox) {
                checkbox.checked = document.getElementById('checkAll').checked;
            });
        });
    </script>
    <script>
        // Simulate Data Fetching
        const dashboardData = {
            totalMembers: 200,
            totalMale: 100,
            totalFemale: 100,
            todaysVisitors: 20,
            totalDonations: 1200,
        };

        // Update Dashboard Data
        document.getElementById('total-members').textContent = dashboardData.totalMembers;
        document.getElementById('total-male').textContent = dashboardData.totalMale;
        document.getElementById('total-female').textContent = dashboardData.totalFemale;
        document.getElementById('todays-visitors').textContent = dashboardData.todaysVisitors;
        document.getElementById('total-donations').textContent = `$${dashboardData.totalDonations}`;

        // Sidebar Link Active State
        const links = document.querySelectorAll('.sidebar a');
        links.forEach(link => {
            link.addEventListener('click', () => {
                links.forEach(l => l.classList.remove('active'));
                link.classList.add('active');
            });
        });

        // Responsive Sidebar Toggle (Optional)
        const sidebar = document.querySelector('.sidebar');
        window.addEventListener('resize', () => {
            if (window.innerWidth < 768) {
                sidebar.style.width = '100%';
            } else {
                sidebar.style.width = '250px';
            }
        });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
