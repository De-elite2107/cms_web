<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Management Dashboard</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome for Icons -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
            margin: 0;
            padding: 0;
        }

        /* Sidebar */
        .sidebar {
            height: 100vh;
            width: 250px;
            position: fixed;
            background: linear-gradient(to bottom, #ff7e5f, #feb47b);
            color: #fff;
            padding: 15px;
        }

        .sidebar h2 {
            font-size: 1.5rem;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .sidebar a {
            display: block;
            color: #fff;
            text-decoration: none;
            padding: 10px;
            margin: 5px 0;
            border-radius: 5px;
            transition: all 0.3s ease-in-out;
        }

        .sidebar a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        /* Main Content */
        .main-content {
            margin-left: 270px;
            padding: 20px;
        }

        .card-container {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }

        .card {
            flex: 1 1 calc(33.333% - 20px);
            background: #fff;
            border: none;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            text-align: center;
            padding: 20px;
            transition: transform 0.3s ease-in-out;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
        }

        .card h3 {
            font-size: 1.25rem;
            margin: 10px 0;
        }

        .card i {
            font-size: 2rem;
            color: #ff7e5f;
        }

        /* Table Styling */
        .table {
            margin-top: 20px;
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }

        @media screen and (max-width: 768px) {
            .main-content {
                margin-left: 0;
            }

            .card {
                flex: 1 1 calc(50% - 20px);
            }

            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
            }
        }

        @media screen and (max-width: 480px) {
            .card {
                flex: 1 1 100%;
            }
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <h2>Church Dashboard</h2>
        <a href="#dashboard"><i class="fa fa-home me-2"></i> Dashboard</a>
        <a href="#registration"><i class="fa fa-user-plus me-2"></i> Registration</a>
        <a href="#attendance"><i class="fa fa-calendar-check me-2"></i> Attendance</a>
        <a href="#donation"><i class="fa fa-donate me-2"></i> Donation</a>
        <a href="#groups"><i class="fa fa-users me-2"></i> Groups</a>
        <a href="#events"><i class="fa fa-calendar-alt me-2"></i> Events</a>
        <a href="#reports"><i class="fa fa-chart-bar me-2"></i> Reports</a>
        <a href=""><i class="fa fa-envelope me-2"></i> Bulk Email</a>
        <a href="send_mass_sms.html"><i class="fa fa-message me-2"></i> Bulk SMS</a>
    </div>
    <div class="main-content">

        <h1>Send Mass Email</h1>
        <form id="emailForm">
            <input type="checkbox" id="checkAll"> Select all Recipient<br/><br/>
            <div>
                <label for="subject">Subject</label>
                <input type="text" id="subject" class="form-control" name="subject">
            </div>
            <div>
                <label for="message">Message</label>
                <textarea id="message" class="form-control" name="message"></textarea>
            </div>
            <div>
                <label for="recipients">Recipients</label>
                <select id="recipients" class="form-select" name="recipients" multiple>
                    <!-- Populate dynamically -->
                </select>
            </div>
            <button type="submit" class="btn btn-primary mt-3">Send Emails</button>
        </form>

        <div id="responseMessages" class="mt-3"></div>
    </div>
    <script>
        // Example endpoint URL
        const apiUrl = "http://cmsserver.up.railway.app/api/send-mass-email/";

        // Dynamically populate recipients (you can replace this with a fetch to your backend)
        // Replace with your actual API endpoint
        const usersApiUrl = "https://cmsserver.up.railway.app/api/get-all-users/";

        // Function to fetch and populate recipients
        async function fetchAndPopulateRecipients() {
            try {
                // Make sure the auth token is available
                const authToken = localStorage.getItem("authToken");
                if (!authToken) {
                    throw new Error("Authentication token is missing. Please log in again.");
                }

                const response = await fetch("https://cmsserver.up.railway.app/users/get-all-users/")
                .then((response) => {
                    if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response; // Parse the response as JSON
                })
                .then((data) => {
                    console.log("Users fetched successfully:", data);
                    // Process the fetched data
                    const users = data.data; // Assuming your API response includes `data` field
                    users.forEach((user) => {
                    console.log(`User: ${user.username} - Email: ${user.email}`);
                    });
                })
                .catch((error) => {
                    console.error("Error fetching users:", error);
                });

                // Populate the recipients dropdown
                const recipientsDropdown = document.getElementById("recipients");
                if (!recipientsDropdown) {
                    throw new Error("Recipients dropdown element not found.");
                }

                recipientsDropdown.innerHTML = ""; // Clear existing options
                users.forEach((user) => {
                    const option = document.createElement("option");
                    option.value = user.email; // Set the value as the user's email
                    option.textContent = user.email; // Display the user's email
                    recipientsDropdown.appendChild(option);
                });
            } catch (error) {
                // Log the error and optionally display a user-friendly message
                console.error("Error fetching recipients:", error);
                alert("An error occurred while fetching recipients. Please try again later.");
            }
        }

        // Call the function on page load
        document.addEventListener("DOMContentLoaded", () => {
            fetchAndPopulateRecipients();
        });
        //end of dynamically allocating
        const recipientsDropdown = document.getElementById("recipients");
        recipients.forEach((user) => {
            const option = document.createElement("option");
            option.value = user.email;
            option.textContent = user.email;
            recipientsDropdown.appendChild(option);
        });

        // Handle form submission
        document.getElementById("emailForm").addEventListener("submit", async (event) => {
            event.preventDefault(); // Prevent default form submission

            const subject = document.getElementById("subject").value;
            const message = document.getElementById("message").value;
            const selectedRecipients = Array.from(recipientsDropdown.selectedOptions).map(
                (option) => option.value
            );

            const payload = {
                subject,
                message,
                recipients: selectedRecipients,
            };

            try {
                const response = await fetch(apiUrl, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        Authorization: "Token your-auth-token", // Replace with the user's token
                    },
                    body: JSON.stringify(payload),
                });

                const data = await response.json();
                const responseMessages = document.getElementById("responseMessages");
                responseMessages.innerHTML = "";
                if (response.ok) {
                    responseMessages.innerHTML = `<p class="text-success">Emails sent successfully!</p>`;
                } else {
                    responseMessages.innerHTML = `<p class="text-danger">Error: ${data.error || "Failed to send emails."}</p>`;
                }
            } catch (error) {
                console.error("Error sending emails:", error);
            }
        });

        // Handle "Select All" toggle
        document.getElementById("checkAll").addEventListener("change", (event) => {
            const isChecked = event.target.checked;
            const options = recipientsDropdown.options;
            for (let i = 0; i < options.length; i++) {
                options[i].selected = isChecked;
            }
        });
    </script>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha3/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
